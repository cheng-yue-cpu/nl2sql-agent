<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL2SQL 前后端交互测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .status-bar {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
        }
        .status-item {
            text-align: center;
        }
        .status-label {
            font-size: 12px;
            color: #6c757d;
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 18px;
            font-weight: bold;
        }
        .status-value.ok {
            color: #28a745;
        }
        .status-value.error {
            color: #dc3545;
        }
        .content {
            padding: 30px;
        }
        .test-section {
            margin-bottom: 30px;
        }
        .test-section h2 {
            font-size: 20px;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        .test-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .result-box {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }
        .result-item {
            padding: 10px;
            margin-bottom: 10px;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #667eea;
        }
        .result-item.success {
            border-left-color: #28a745;
        }
        .result-item.error {
            border-left-color: #dc3545;
        }
        .result-item pre {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 4px;
            font-size: 12px;
            overflow-x: auto;
            margin-top: 8px;
        }
        .log-box {
            background: #1e1e1e;
            color: #d4d4d4;
            border-radius: 6px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 15px;
        }
        .log-entry {
            margin-bottom: 5px;
        }
        .log-entry.info {
            color: #4ec9b0;
        }
        .log-entry.success {
            color: #6a9955;
        }
        .log-entry.error {
            color: #f48771;
        }
        .log-entry.warning {
            color: #dcdcaa;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: 500;
            color: #333;
        }
        .input-group input,
        .input-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .input-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔌 NL2SQL 前后端交互测试</h1>
            <p>测试前端与后端 API 的连接和功能</p>
        </div>

        <div class="status-bar">
            <div class="status-item">
                <div class="status-label">前端服务</div>
                <div class="status-value" id="frontend-status">检测中...</div>
            </div>
            <div class="status-item">
                <div class="status-label">后端服务</div>
                <div class="status-value" id="backend-status">检测中...</div>
            </div>
            <div class="status-item">
                <div class="status-label">CORS 状态</div>
                <div class="status-value" id="cors-status">检测中...</div>
            </div>
        </div>

        <div class="content">
            <!-- 基础连接测试 -->
            <div class="test-section">
                <h2>📡 基础连接测试</h2>
                <div class="test-buttons">
                    <button class="btn btn-primary" onclick="testFrontend()">测试前端</button>
                    <button class="btn btn-primary" onclick="testBackendHealth()">测试后端健康</button>
                    <button class="btn btn-primary" onclick="testCORS()">测试 CORS</button>
                    <button class="btn btn-success" onclick="runAllTests()">运行所有测试</button>
                </div>
                <div class="result-box" id="basic-results"></div>
            </div>

            <!-- NL2SQL 功能测试 -->
            <div class="test-section">
                <h2>🤖 NL2SQL 功能测试</h2>
                <div class="input-group">
                    <label>查询语句：</label>
                    <input type="text" id="query-input" value="统计用户总数" placeholder="输入自然语言查询...">
                </div>
                <div class="input-group">
                    <label>Agent ID：</label>
                    <input type="text" id="agent-id" value="1" style="width: 100px;">
                </div>
                <div class="test-buttons">
                    <button class="btn btn-primary" onclick="testNL2SQL()">发送查询</button>
                    <button class="btn btn-primary" onclick="testMultiTurn()">测试多轮对话</button>
                </div>
                <div class="result-box" id="nl2sql-results"></div>
            </div>

            <!-- 实时日志 -->
            <div class="test-section">
                <h2>📋 实时日志</h2>
                <div class="log-box" id="log-box">
                    <div class="log-entry info">等待测试...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        let testThreadId = 'test_' + Date.now();

        // 日志函数
        function log(message, type = 'info') {
            const logBox = document.getElementById('log-box');
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            logBox.appendChild(entry);
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 添加结果
        function addResult(containerId, title, success, data) {
            const container = document.getElementById(containerId);
            const item = document.createElement('div');
            item.className = `result-item ${success ? 'success' : 'error'}`;
            item.innerHTML = `
                <strong>${success ? '✅' : '❌'} ${title}</strong>
                <pre>${JSON.stringify(data, null, 2)}</pre>
            `;
            container.appendChild(item);
        }

        // 更新状态
        function updateStatus(id, text, ok) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `status-value ${ok ? 'ok' : 'error'}`;
        }

        // 测试前端
        async function testFrontend() {
            log('开始测试前端...', 'info');
            try {
                const response = await fetch(window.location.href, { method: 'HEAD' });
                updateStatus('frontend-status', '运行中 (' + response.status + ')', true);
                log('前端服务正常', 'success');
                addResult('basic-results', '前端服务', true, { 
                    status: response.status,
                    url: window.location.href
                });
            } catch (error) {
                updateStatus('frontend-status', '错误', false);
                log('前端测试失败：' + error.message, 'error');
                addResult('basic-results', '前端服务', false, { error: error.message });
            }
        }

        // 测试后端健康
        async function testBackendHealth() {
            log('开始测试后端健康...', 'info');
            try {
                const response = await fetch(`${API_BASE}/health`);
                const data = await response.json();
                updateStatus('backend-status', '运行中', true);
                log('后端服务正常', 'success');
                addResult('basic-results', '后端健康检查', true, data);
            } catch (error) {
                updateStatus('backend-status', '错误', false);
                log('后端测试失败：' + error.message, 'error');
                addResult('basic-results', '后端健康检查', false, { error: error.message });
            }
        }

        // 测试 CORS
        async function testCORS() {
            log('开始测试 CORS...', 'info');
            try {
                const response = await fetch(`${API_BASE}/api/nl2sql/query`, {
                    method: 'OPTIONS',
                    headers: {
                        'Access-Control-Request-Method': 'POST',
                        'Access-Control-Request-Headers': 'Content-Type',
                        'Origin': window.location.origin
                    }
                });
                
                const corsHeaders = {
                    'Access-Control-Allow-Origin': response.headers.get('Access-Control-Allow-Origin'),
                    'Access-Control-Allow-Methods': response.headers.get('Access-Control-Allow-Methods'),
                    'Access-Control-Allow-Headers': response.headers.get('Access-Control-Allow-Headers')
                };
                
                const allowed = corsHeaders['Access-Control-Allow-Origin'] === window.location.origin;
                updateStatus('cors-status', allowed ? '允许' : '拒绝', allowed);
                log('CORS 测试' + (allowed ? '通过' : '失败'), allowed ? 'success' : 'error');
                addResult('basic-results', 'CORS 测试', allowed, corsHeaders);
            } catch (error) {
                updateStatus('cors-status', '错误', false);
                log('CORS 测试失败：' + error.message, 'error');
                addResult('basic-results', 'CORS 测试', false, { error: error.message });
            }
        }

        // 测试 NL2SQL
        async function testNL2SQL() {
            const query = document.getElementById('query-input').value;
            const agentId = document.getElementById('agent-id').value;
            
            log(`发送 NL2SQL 查询："${query}"`, 'info');
            
            try {
                const startTime = Date.now();
                const response = await fetch(`${API_BASE}/api/nl2sql/query`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        query: query,
                        agent_id: agentId,
                        thread_id: testThreadId
                    })
                });
                
                const duration = Date.now() - startTime;
                const data = await response.json();
                
                log(`NL2SQL 响应 (${duration}ms)`, 'success');
                
                if (data.error) {
                    throw new Error(data.error);
                }
                
                addResult('nl2sql-results', `查询："${query}"`, true, {
                    响应时间：duration + 'ms',
                    标准查询：data.canonical_query,
                    生成 SQL: data.generated_sql,
                    结果：data.sql_result
                });
                
            } catch (error) {
                log('NL2SQL 查询失败：' + error.message, 'error');
                addResult('nl2sql-results', `查询："${query}"`, false, { error: error.message });
            }
        }

        // 测试多轮对话
        async function testMultiTurn() {
            log('开始多轮对话测试...', 'info');
            const agentId = document.getElementById('agent-id').value;
            testThreadId = 'multiturn_' + Date.now();
            
            const queries = [
                '统计用户总数',
                '平均年龄呢？',
                '最大的呢？'
            ];
            
            for (let i = 0; i < queries.length; i++) {
                log(`第${i + 1}轮："${queries[i]}"`, 'info');
                
                try {
                    const response = await fetch(`${API_BASE}/api/nl2sql/query`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            query: queries[i],
                            agent_id: agentId,
                            thread_id: testThreadId
                        })
                    });
                    
                    const data = await response.json();
                    
                    addResult('nl2sql-results', `第${i + 1}轮：${queries[i]}`, !data.error, {
                        标准查询：data.canonical_query,
                        SQL: data.generated_sql,
                        结果：data.sql_result?.data
                    });
                    
                    // 等待 1 秒
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                } catch (error) {
                    addResult('nl2sql-results', `第${i + 1}轮：${queries[i]}`, false, { error: error.message });
                }
            }
            
            log('多轮对话测试完成', 'success');
        }

        // 运行所有测试
        async function runAllTests() {
            log('========== 开始运行所有测试 ==========', 'info');
            document.getElementById('basic-results').innerHTML = '';
            document.getElementById('nl2sql-results').innerHTML = '';
            
            await testFrontend();
            await testBackendHealth();
            await testCORS();
            
            log('========== 基础测试完成 ==========', 'success');
            
            await testNL2SQL();
            
            log('========== 所有测试完成 ==========', 'success');
        }

        // 页面加载时自动检测
        window.onload = async () => {
            log('页面加载完成，自动检测服务状态...', 'info');
            await testFrontend();
            await testBackendHealth();
            await testCORS();
            log('服务状态检测完成', 'success');
        };
    </script>
</body>
</html>
